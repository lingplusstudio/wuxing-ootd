    function calculate() {
        const birthVal = document.getElementById('birthday').value;
        const targetVal = document.getElementById('target-date').value;
        
        if (!birthVal || !targetVal) return alert('請確認生日與想查詢的日期都有填寫喔！');

        localStorage.setItem('userBirthday', birthVal);

        const [by, bm, bd] = birthVal.split('-').map(Number);
        const userGan = Solar.fromYmd(by, bm, bd).getLunar().getEightChar().getDayGan();
        const userEl = ganToElement[userGan];

        const [ty, tm, td] = targetVal.split('-').map(Number);
        const lunarEightChar = Solar.fromYmd(ty, tm, td).getLunar().getEightChar();
        
        const targetGan = lunarEightChar.getDayGan();
        const targetEl = ganToElement[targetGan];
        
        const targetZhi = lunarEightChar.getDayZhi();
        const targetZhiEl = zhiToElement[targetZhi];

        // --- 1. 外層運算 (天干) ---
        let recommendEl = '';
        let logicHtml = '';

        if (targetEl === shengMeMap[userEl]) {
            recommendEl = targetEl;
            logicHtml = `該日天干(<b>${targetEl}</b>)生旺您的本命(<b>${userEl}</b>)。今天是您的「<b>印星貴人日</b>」！外顯穿著 ${recommendEl} 系配方能完美吸收外界助力。`;
        } else if (targetEl === userEl) {
            recommendEl = sheng[userEl]; 
            logicHtml = `該日天干與您同屬 <b>${userEl}</b>。今日 ${userEl} 氣疊加，若再穿同色系容易物極必反！因此系統為您外層調配了 <b>${recommendEl}</b> 系。透過洩秀原理，轉化過剩能量！`;
        } else if (targetEl === sheng[userEl]) {
            recommendEl = targetEl;
            logicHtml = `您的本命(<b>${userEl}</b>)生旺該日天干(<b>${targetEl}</b>)。今天是您的「<b>食傷日</b>」，充滿創造力！外顯穿著 ${recommendEl} 系能讓你的魅力自然散發。`;
        } else if (targetEl === ke[userEl]) {
            recommendEl = targetEl;
            logicHtml = `您的本命(<b>${userEl}</b>)剋制該日天干(<b>${targetEl}</b>)。命理中「我剋者為財」，今天是「<b>財星日</b>」！外顯穿著 ${recommendEl} 系來牢牢掌握今日成果。`;
        } else {
            recommendEl = shengMeMap[userEl]; 
            logicHtml = `該日天干(<b>${targetEl}</b>)剋制您的本命(<b>${userEl}</b>)。今天是「<b>官殺日</b>」，容易感到壓力。系統為您外層調配 <b>${recommendEl}</b> 系(您的貴人色)，利用五行通關轉化阻力！`;
        }

        const formula = formulaData[recommendEl];

        // --- 2. 內層雙核心運算 (地支專屬防護罩) ---
        let innerRecommendEl = '';
        let innerLogicHtml = '';

        // 判斷今日地支是否會耗損本命能量 (我生、我剋、剋我)
        const isDraining = (targetZhiEl === sheng[userEl]) || (targetZhiEl === ke[userEl]) || (ke[targetZhiEl] === userEl);

        if (isDraining) {
            innerRecommendEl = shengMeMap[userEl]; // 治癒色：印星 (生我)
            innerLogicHtml = `今日底層暗流 (<b>${targetZhiEl}</b>) 較為耗神，為您啟動專屬的「<b>治癒防護罩</b>」。用 <b>${innerRecommendEl}系</b> 來撫平焦慮、補充內在安全感！`;
        } else {
            innerRecommendEl = userEl; // 扎根色：比肩 (同我)
            innerLogicHtml = `今日底層暗流 (<b>${targetZhiEl}</b>) 對您非常友善，為您啟動專屬的「<b>本命扎根色</b>」。用 <b>${innerRecommendEl}系</b> 讓你的自信從內而外穩固散發！`;
        }


        // --- UI 渲染 ---
        document.getElementById('result-container').style.display = 'block';
        document.getElementById('detail-panel').style.display = 'block'; 

        document.getElementById('formula-name').innerHTML = `🌟 ${targetVal.replace(/-/g, '/')} 配方：<br><span style="font-size: 1.1rem">${formula.name}</span>`;
        document.getElementById('formula-name').style.color = formula.themeColor;
        document.documentElement.style.setProperty('--primary', formula.themeColor);

        const seed = by + bm + bd + ty + tm + td;
        const variationIndex = seed % formula.vibes.length;

        const barContainer = document.getElementById('ratio-bar');
        const zhiBarContainer = document.getElementById('zhi-ratio-bar');
        const legendContainer = document.getElementById('ratio-legend');
        barContainer.innerHTML = '';
        zhiBarContainer.innerHTML = '';
        legendContainer.innerHTML = '';

// 🌟 抽出今日幸運箴言
        // 用日期和生日的組合 (seed) 來抽籤，確保同一個人同一天測出來的箴言是一致的！
        const quotes = quotesData[innerRecommendEl];
        const quoteIndex = seed % quotes.length;
        document.getElementById('quote-text').innerText = `「 ${quotes[quoteIndex]} 」`;
        // 🌟 畫出粗的「外顯穿搭」比例條
        const currentSegments = formula.segmentVariations[variationIndex];

            const textColor = seg.colorText ? seg.colorText : 'white';

        // 🌟 畫出細的「內在防護罩」專屬比例條
        const zhiColorHex = { '木': '#38A169', '火': '#E53E3E', '土': '#D69E2E', '金': '#CBD5E0', '水': '#4299E1' };
        const zhiColorText = { '木': 'white', '火': 'white', '土': 'white', '金': '#2d3748', '水': 'white' };
        const innerBgColor = zhiColorHex[innerRecommendEl];
        const innerTxColor = zhiColorText[innerRecommendEl];

        zhiBarContainer.innerHTML = `
            <div class="zhi-segment" style="width: 100%; background: ${innerBgColor}; color: ${innerTxColor};" title="(專屬內含) 細節：${innerRecommendEl}系">
                (專屬防護) ${innerRecommendEl}系能量
            </div>
        `;

        legendContainer.innerHTML += `
            <div class="legend-item" style="margin-left: 8px; padding-left: 12px; border-left: 2px solid #e2e8f0;">
                <div class="legend-color-box" style="background: ${innerBgColor}; border: 1px solid #e2e8f0;"></div>
                <span><strong>(內) 專屬防護：${innerRecommendEl}系</strong></span>
            </div>
        `;

        document.getElementById('vibe-text').innerText = formula.vibes[variationIndex];
        document.getElementById('tips-text').innerText = formula.tips[variationIndex];

        // 🌟 渲染極度個人化的隱藏電池文案
        const zhiColors = { '木': '綠色/植物系', '火': '紅/紫/暖色系', '土': '大地/黃褐色系', '金': '白/金屬色系', '水': '黑/藍色系' };
        const zhiItems = {
            '木': '木質調香水、綠色襪子或棉麻內衣',
            '火': '暖色系內著、紅色小飾品或帶個暖暖包',
            '土': '大地色包包內裡、卡其色襪子或天然礦石',
            '金': '金屬鑰匙圈、白色貼身衣物或簡約銀飾',
            '水': '深色內著、保濕香氛或隨身帶一瓶水'
        };
        
        document.getElementById('zhi-text').innerHTML = `
            ${innerLogicHtml}<br><br>
            ✨ <b>細節點綴：</b>建議搭配 <b>${zhiColors[innerRecommendEl]}</b> 的貼身衣物，或是 <b>${zhiItems[innerRecommendEl]}</b>。打造你的專屬充電站！
        `;

        document.getElementById('detail-user').innerText = `${userGan}日 (${userEl}命)`;
        document.getElementById('detail-target').innerText = `${targetGan}${targetZhi}日 (天干 ${targetEl} / 地支 ${targetZhiEl})`;
        document.getElementById('detail-logic').innerHTML = logicHtml;
    }
// 🌟 輔助魔法：將圖片資料轉成真正的「檔案」格式
    function dataURLtoFile(dataurl, filename) {
        var arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
            bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
        while(n--){
            u8arr[n] = bstr.charCodeAt(n);
        }
        return new File([new Blob([u8arr], {type:mime})], filename, {type: mime});
    }

    // 🌟 全新升級：呼叫手機原生分享選單 (直接儲存影像 / 發 IG)
    function downloadCard() {
        const shareBtn = document.getElementById('share-btn');
        const targetElement = document.getElementById('result-container');
        
        // 1. 拍照前準備：隱藏按鈕，加上專屬浮水印
        shareBtn.style.display = 'none';
        const watermark = document.createElement('div');
        watermark.id = 'temp-watermark';
        watermark.innerHTML = '✨ 測測你的今日能量防護罩：lingplusstudio.github.io/wuxing-ootd';
        watermark.style.textAlign = 'center';
        watermark.style.fontSize = '0.85rem';
        watermark.style.color = '#718096'; 
        watermark.style.marginTop = '1.5rem';
        watermark.style.paddingBottom = '1rem';
        watermark.style.fontWeight = 'bold';
        targetElement.appendChild(watermark);

        // 2. 確保卡片拍照時有純白底色跟邊距
        const originalBg = targetElement.style.background;
        const originalPadding = targetElement.style.padding;
        const originalRadius = targetElement.style.borderRadius;

        targetElement.style.background = '#ffffff';
        targetElement.style.padding = '25px';
        targetElement.style.borderRadius = '16px';

        // 3. 執行高畫質 SVG 截圖魔法
        htmlToImage.toPng(targetElement, { 
            pixelRatio: 2, 
            backgroundColor: '#ffffff' 
        })
        .then(function (dataUrl) {
            // ✨ 把截下來的圖，包裝成一個真正的圖片檔案
            const file = dataURLtoFile(dataUrl, '我的五行穿搭配方.png');

            // 復原畫面
            targetElement.removeChild(watermark);
            targetElement.style.background = originalBg;
            targetElement.style.padding = originalPadding;
            targetElement.style.borderRadius = originalRadius;
            shareBtn.style.display = 'flex';

            // ✨ 呼叫手機原生的分享選單！
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                // 如果是手機（支援分享 API），就彈出原生選單
                navigator.share({
                    files: [file],
                    title: '專屬五行穿搭配方',
                    text: '這是我今天的五行能量防護罩！一起來測測看吧 ✨'
                }).catch(console.error); // 使用者取消分享也不會報錯
            } else {
                // 如果是電腦版（不支援原生分享），就退回傳統的直接下載模式
                const link = document.createElement('a');
                link.download = '我的五行穿搭配方_LINGPLUS.png';
                link.href = dataUrl;
                link.click();
            }
        })
        .catch(function (error) {
            console.error('截圖失敗!', error);
            alert('截圖發生錯誤，請稍後再試！');
            targetElement.removeChild(watermark);
            targetElement.style.background = originalBg;
            targetElement.style.padding = originalPadding;
            targetElement.style.borderRadius = originalRadius;
            shareBtn.style.display = 'flex';
        });
    }
