    <style>

        .title-symbols { margin: 0 8px; color: #4a5568; }

        /* 🌟 新增：專門給手機螢幕的防斷行設定 */
        @media (max-width: 480px) {
            h2 { font-size: 1.35rem; letter-spacing: 0; } /* 字體稍微縮小 */
            .title-symbols { margin: 0 4px; } /* 間距縮小 */
        }
        
        .layout-wrapper { display: flex; flex-direction: column; gap: 2.5rem; }
        @media (min-width: 768px) {
            .layout-wrapper { flex-direction: row; }
            .left-col { flex: 0 0 320px; border-right: 1px solid #edf2f7; padding-right: 2rem; }
            .right-col { flex: 1; padding-left: 0.5rem; }
        }

        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.95rem; }
        input[type="date"] { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 1rem; color: #4a5568; outline: none; transition: border 0.3s; font-family: inherit; }
        input[type="date"]:focus { border-color: var(--primary); }
        button.btn-primary { width: 100%; padding: 14px; background: #2d3748; color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: background 0.2s, transform 0.1s; margin-top: 0.5rem; }
        button.btn-primary:hover { background: #1a202c; }
        button.btn-primary:active { transform: scale(0.98); }

        #detail-panel { display: none; background: #fffaf0; border: 1px solid #f6e05e; padding: 1.5rem 1.2rem; border-radius: 12px; margin-top: 2rem; font-size: 0.95rem; color: #744210; animation: fadeIn 0.5s; box-shadow: 0 4px 6px rgba(236, 201, 75, 0.1); }

        .footer { margin-top: auto; padding-bottom: 1rem; font-size: 0.85rem; color: #a0aec0; letter-spacing: 0.5px; text-align: center; }

    function calculate() {
        const birthVal = document.getElementById('birthday').value;
        const targetVal = document.getElementById('target-date').value;
        
        if (!birthVal || !targetVal) return alert('請確認生日與想查詢的日期都有填寫喔！');

        localStorage.setItem('userBirthday', birthVal);

        // 1. 取得年月日數字
        const [by, bm, bd] = birthVal.split('-').map(Number);
        const userGan = Solar.fromYmd(by, bm, bd).getLunar().getEightChar().getDayGan();
        const userEl = ganToElement[userGan];

        const [ty, tm, td] = targetVal.split('-').map(Number);
        const targetGan = Solar.fromYmd(ty, tm, td).getLunar().getEightChar().getDayGan();
        const targetEl = ganToElement[targetGan];

        let recommendEl = '';
        let logicHtml = '';

        // 2. 命理邏輯判斷
        if (targetEl === shengMeMap[userEl]) {
            recommendEl = targetEl;
            logicHtml = `該日五行(<b>${targetEl}</b>)生旺您的本命(<b>${userEl}</b>)。今天是您的「<b>印星貴人日</b>」！穿著 ${recommendEl} 系配方能完美吸收外界給你的助力與好運。`;
        } else if (targetEl === userEl) {
            recommendEl = sheng[userEl]; 
            logicHtml = `該日五行與您同屬 <b>${userEl}</b>。今日 ${userEl} 氣過於疊加，若再穿同色系容易物極必反、情緒浮躁！因此系統為您調配了 <b>${recommendEl}</b> 系配方。透過「${userEl}生${recommendEl}」的洩秀原理，將過剩能量轉化為柔和的才華與魅力！`;
        } else if (targetEl === sheng[userEl]) {
            recommendEl = targetEl;
            logicHtml = `您的本命(<b>${userEl}</b>)生旺該日五行(<b>${targetEl}</b>)。今天是您的「<b>食傷日</b>」，代表才華洋溢、充滿創造力！順應能量流動，穿著 ${recommendEl} 系能讓你的魅力自然散發。`;
        } else if (targetEl === ke[userEl]) {
            recommendEl = targetEl;
            logicHtml = `您的本命(<b>${userEl}</b>)剋制該日五行(<b>${targetEl}</b>)。在命理中「我剋者為財」，今天是您的「<b>財星日</b>」！穿著 ${recommendEl} 系來迎接並牢牢掌握今天的財富與事業成果吧。`;
        } else {
            recommendEl = shengMeMap[userEl]; 
            logicHtml = `該日五行(<b>${targetEl}</b>)剋制您的本命(<b>${userEl}</b>)。今天是「<b>官殺日</b>」，容易感到外界壓力。系統為您調配了 <b>${recommendEl}</b> 系(您的貴人色)，利用「${targetEl}生${recommendEl}、${recommendEl}生${userEl}」的通關原理，將阻力完美轉化為助力！`;
        }

        const formula = formulaData[recommendEl];

        // --- UI 渲染 ---
        document.getElementById('result-container').style.display = 'block';
        document.getElementById('detail-panel').style.display = 'block'; 

        document.getElementById('formula-name').innerHTML = `🌟 ${targetVal.replace(/-/g, '/')} 配方：<br><span style="font-size: 1.1rem">${formula.name}</span>`;
        document.getElementById('formula-name').style.color = formula.themeColor;
        document.documentElement.style.setProperty('--primary', formula.themeColor);

        // 🌟 新增：提前計算出今天的「專屬號碼」，用來同時抽取文案與比例條
        const seed = by + bm + bd + ty + tm + td;
        const variationIndex = seed % formula.vibes.length;

        // 渲染比例條與圖例
        const barContainer = document.getElementById('ratio-bar');
        const legendContainer = document.getElementById('ratio-legend');
        barContainer.innerHTML = '';
        legendContainer.innerHTML = '';

        // 這裡改成抓取 formula.segmentVariations 裡面的第幾組比例！
        const currentSegments = formula.segmentVariations[variationIndex];

        currentSegments.forEach(seg => {
            const textColor = seg.colorText ? seg.colorText : 'white';
            barContainer.innerHTML += `<div class="ratio-segment" style="width: ${seg.width}; background: ${seg.color}; color: ${textColor};" title="${seg.text}">${seg.width}</div>`;
            legendContainer.innerHTML += `
                <div class="legend-item">
                    <div class="legend-color-box" style="background: ${seg.color};"></div>
                    <span>${seg.text}</span>
                </div>
            `;
        });

        // 渲染靈感與小訣竅
        document.getElementById('vibe-text').innerText = formula.vibes[variationIndex];
        document.getElementById('tips-text').innerText = formula.tips[variationIndex];

    }
